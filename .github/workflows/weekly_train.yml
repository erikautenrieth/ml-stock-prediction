# Runs every Sunday at 02:00 UTC — full pipeline including Optuna retraining.
# Optuna tuning (60 trials × 5-fold CV) takes ~15-30 min on a standard runner.
# A new champion model is registered in MLflow/DagsHub only when it beats
# the current accuracy OR the feature set has changed (n_features check).
name: Weekly Train Pipeline

on:
  schedule:
    - cron: "0 2 * * 0"    # Sunday 02:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  train:
    name: Fetch + Train + Predict
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_REPO_OWNER }}
      DAGSHUB_REPO_NAME:  ${{ secrets.DAGSHUB_REPO_NAME }}
      DAGSHUB_TOKEN:      ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        # Exclude dev (test/lint tools) and frontend (streamlit/plotly) — not needed in CI
        run: poetry install --without dev,frontend

      - name: Fetch market data
        run: poetry run python -m backend.workflows.fetch_data

      - name: Train model (Optuna tuning)
        run: poetry run python -m backend.workflows.train

      - name: Run prediction
        run: poetry run python -m backend.workflows.predict
